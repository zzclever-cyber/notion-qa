[alembic]
# Alembic database migration config (keep this file ASCII-only:
# alembic 1.18 reads it with the system locale encoding, which is GBK on
# zh-CN Windows and chokes on UTF-8 CJK bytes)
script_location = alembic
sqlalchemy.url = sqlite+aiosqlite:///data/rag_agent.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
