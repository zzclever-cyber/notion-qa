version: "3.9"

# ============================================================
# 企业级 RAG Agent — Docker Compose 编排
# 一键启动: docker compose up -d
# ============================================================

services:
  # ─── RAG Agent 核心服务 ───
  rag-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-agent:latest
    container_name: rag-agent
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      # 持久化索引和评测数据
      - rag_data:/app/data
      # 日志外挂
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - rag-network

  # ─── Redis 会话存储 ───
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

volumes:
  rag_data:
    driver: local
  redis_data:
    driver: local

networks:
  rag-network:
    driver: bridge
